name: Build OHOS

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: build-ohos-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  build_hap:
    name: Build unsigned HAP
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/honjow/harmonyos-build-env:26.0-api26
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version consistency
        shell: bash
        run: |
          node scripts/test_version_consistency_contract.mjs

      - name: Get app version
        shell: bash
        run: |
          version=$(node -e "const fs=require('fs'); const m=fs.readFileSync('oh-package.json5','utf8').match(/\"version\"\\s*:\\s*\"([^\"]+)\"/); console.log(m ? m[1] : '0.0.0')")
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Install OHPM dependencies
        shell: bash
        run: |
          ohpm install --all

      - name: Build unsigned HAP (debug)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          hvigorw assembleHap --mode module -p product=default -p buildMode=debug --no-daemon

      - name: Build unsigned HAP (release)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          cleanup_release_prune() {
            python3 scripts/prune-release-media-resources.py --restore
          }
          trap cleanup_release_prune EXIT
          python3 scripts/prune-release-media-resources.py --apply
          hvigorw assembleHap --mode module -p product=default -p buildMode=release --no-daemon
          cleanup_release_prune
          trap - EXIT

      - name: Collect unsigned HAP
        shell: bash
        run: |
          src="entry/build/default/outputs/default/entry-default-unsigned.hap"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            dst="Next2V_${APP_VERSION}_ohos-release-unsigned.hap"
          else
            dst="Next2V_${APP_VERSION}_ohos-debug-unsigned.hap"
          fi
          test -f "$src"
          cp "$src" "$dst"
          echo "HAP_PATH=$dst" >> "$GITHUB_ENV"

      - name: Inspect unsigned HAP
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          hap = Path(os.environ['HAP_PATH'])
          with zipfile.ZipFile(hap) as z:
              names = z.namelist()
          x86 = sum(1 for name in names if name.startswith('libs/x86_64/'))
          arm64 = sum(1 for name in names if name.startswith('libs/arm64-v8a/'))
          source_maps = 'ets/sourceMaps.map' in names
          icon_media = sorted(
              name for name in names
              if name.startswith('resources/base/media/')
              and (name.rsplit('/', 1)[-1].startswith('app_icon') or name.rsplit('/', 1)[-1].startswith('startup_foreground'))
          )
          print(f'HAP: {hap}')
          print(f'Size MiB: {hap.stat().st_size / 1024 / 1024:.2f}')
          print(f'arm64 entries: {arm64}')
          print(f'x86_64 entries: {x86}')
          print(f'has sourceMaps.map: {source_maps}')
          print('icon/startup media:')
          for name in icon_media:
              print(f'  {name}')

          if os.environ.get('GITHUB_REF', '').startswith('refs/tags/'):
              required = {
                  'resources/base/media/app_icon_layered.json',
                  'resources/base/media/app_icon_sunset_solid_background.png',
                  'resources/base/media/app_icon_sunset_solid_foreground.png',
                  'resources/base/media/startup_foreground.png',
              }
              missing = sorted(required - set(names))
              if missing:
                  raise SystemExit(f'release HAP missing required media: {missing}')
              if x86:
                  raise SystemExit('release HAP unexpectedly contains x86_64 native libraries')
              if source_maps:
                  raise SystemExit('release HAP unexpectedly contains ets/sourceMaps.map')
          PY

      - name: Upload unsigned HAP
        uses: actions/upload-artifact@v4
        with:
          name: ohos-hap-unsigned
          path: ${{ env.HAP_PATH }}
          if-no-files-found: error
          retention-days: 14

  publish:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'stable') && !contains(github.ref, 'alpha') && !contains(github.ref, 'rc')
    name: Publish
    needs: build_hap
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: List artifacts
        shell: bash
        run: |
          ls -R /tmp/artifacts

      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: /tmp/artifacts/ohos-hap-unsigned/*.hap
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref, 'pre') }}
          allowUpdates: true
          artifactErrorsFailBuild: true
          replacesArtifacts: true
          generateReleaseNotes: true
